<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TPE E-Slip</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--navy:#1E3A5F;--navy-dark:#132540;--navy-light:#2a4f80;--gold:#C9952A;--gold-light:#E8B84B;--gold-pale:#FDF5E8;--bg:#F0EDE8;--surface:#FDFCFA;--border:#E2DAD0;--text:#1a1a1a;--muted:#7A7368;--green:#1B7F4E}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.loading-screen{position:fixed;inset:0;background:var(--navy-dark);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s,visibility .4s}
.loading-screen.hide{opacity:0;visibility:hidden;pointer-events:none}
.loading-logo{width:72px;height:72px;background:linear-gradient(135deg,#2C1A00,#C9952A);border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.loading-text{color:rgba(255,255,255,.7);font-size:14px;letter-spacing:.05em}
.loading-bar{width:120px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:16px;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;animation:loading 2s ease forwards}
@keyframes loading{to{width:100%}}

.header{background:linear-gradient(135deg,var(--navy-dark) 0%,var(--navy) 60%,var(--navy-light) 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(0,0,0,.2)}
.header-inner{display:flex;align-items:center;gap:12px;padding:14px 16px}
.header-logo{width:40px;height:40px;background:linear-gradient(135deg,#2C1A00,#C9952A);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px}
.header-info{flex:1;min-width:0}
.header-title{color:#fff;font-size:15px;font-weight:700}
.header-sub{color:var(--gold-light);font-size:11px;margin-top:1px;opacity:.9}
.header-avatar{width:36px;height:36px;border-radius:50%;border:2px solid rgba(201,149,42,.5);object-fit:cover;flex-shrink:0}
.gold-line{height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--gold-light),var(--gold),transparent)}

.profile-section{padding:14px 16px 0}
.profile-card{background:var(--surface);border-radius:16px;padding:14px 16px;border:1px solid var(--border);display:flex;align-items:center;gap:14px}
.profile-avatar{width:50px;height:50px;border-radius:12px;object-fit:cover;border:2px solid var(--gold-pale);flex-shrink:0}
.profile-name{font-size:15px;font-weight:700;color:var(--navy)}
.profile-pos{font-size:12px;color:var(--muted);margin-top:2px}
.profile-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px;margin-top:5px;display:inline-block}
.badge-monthly{background:#E8F5EE;color:var(--green)}
.badge-daily{background:#EEF4FF;color:var(--navy)}

.tabs{padding:12px 16px 0}
.tab-bar{display:flex;gap:8px;background:var(--surface);padding:4px;border-radius:12px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:9px 12px;border:none;border-radius:9px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted);background:transparent}
.tab-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 8px rgba(30,58,95,.3)}

.content{padding:12px 16px 90px}
.section-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px;margin-top:4px}
.month-list{display:flex;flex-direction:column;gap:8px}
.month-card{background:var(--surface);border-radius:14px;border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .18s;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.month-card:active{transform:scale(.98);background:var(--gold-pale)}
.month-icon{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--navy),var(--navy-light));display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.month-info{flex:1;min-width:0}
.month-name{font-size:14px;font-weight:600}
.month-net{font-size:13px;color:var(--green);font-weight:600;margin-top:2px}
.month-arrow{color:var(--muted);font-size:18px;flex-shrink:0}

.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;line-height:1.8}

/* DOC VIEW */
.doc-view{display:none;flex-direction:column;min-height:100vh}
.doc-view.show{display:flex}
.back-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;color:var(--navy);font-weight:600;font-size:14px;background:var(--surface);border-bottom:1px solid var(--border)}
.doc-scroll{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px}
.doc-render{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.1)}

/* ACTION BAR */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;box-shadow:0 -4px 20px rgba(0,0,0,.08);z-index:50}
.action-btn{flex:1;padding:13px 16px;border-radius:12px;border:none;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.action-btn:active{transform:scale(.97)}
.btn-save{background:var(--navy);color:#fff;box-shadow:0 3px 12px rgba(30,58,95,.3)}
.btn-pdf{background:var(--gold);color:#fff;box-shadow:0 3px 12px rgba(201,149,42,.3)}
.btn-disabled{opacity:.6;pointer-events:none}

.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);background:var(--navy-dark);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.skeleton{background:linear-gradient(90deg,#f0ede8 25%,#e8e4df 50%,#f0ede8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-card{height:72px;border-radius:14px;margin-bottom:8px}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">🏢</div>
  <div class="loading-text">TPE E-Slip</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<div class="toast" id="toast"></div>

<div id="app" style="display:none">
  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="header-logo">🏢</div>
      <div class="header-info">
        <div class="header-title">TPE E-Slip</div>
        <div class="header-sub">ธนพลเอ็นจิเนียริ่ง จำกัด</div>
      </div>
      <img id="headerAvatar" class="header-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    </div>
    <div class="gold-line"></div>
  </div>

  <!-- LIST VIEW -->
  <div id="listView">
    <div class="profile-section">
      <div class="profile-card">
        <img id="profileAvatar" class="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        <div>
          <div class="profile-name" id="profileName">กำลังโหลด...</div>
          <div class="profile-pos" id="profilePos">—</div>
          <span class="profile-badge badge-monthly" id="profileBadge">รายเดือน</span>
        </div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab-bar">
        <button class="tab-btn active" id="tabPayslip" onclick="switchTab('payslip')">💰 สลิปเงินเดือน</button>
        <button class="tab-btn" id="tabCert" onclick="switchTab('certificate')">📋 ใบรับรอง</button>
      </div>
    </div>
    <div class="content">
      <div class="section-title" id="sectionTitle">สลิปเงินเดือน</div>
      <div id="monthList">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
    </div>
  </div>

  <!-- DOC VIEW -->
  <div id="docView" class="doc-view">
    <div class="back-bar" onclick="goBack()">← <span id="backLabel">กลับ</span></div>
    <div class="doc-scroll">
      <div class="doc-render" id="docRender"></div>
    </div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar" id="actionBar" style="display:none">
    <button class="action-btn btn-save" id="btnSave" onclick="saveImage()">💾 บันทึกรูป</button>
    <button class="action-btn btn-pdf" id="btnPdf" onclick="downloadPdf()">📄 PDF</button>
  </div>
</div>

<script>
const API = 'https://tpe-hr-bot.onrender.com';
const LIFF_ID = '2010255039-6dQLsh35';

let currentTab = 'payslip';
let empData = null;
let currentDocData = null;

// ── INIT ──────────────────────────────────────────────
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    document.getElementById('headerAvatar').src = profile.pictureUrl || '';
    document.getElementById('profileAvatar').src = profile.pictureUrl || '';
    await loadEmployee(profile.userId);
  } catch(e) {
    document.getElementById('profileName').textContent = 'เกิดข้อผิดพลาด';
    console.error(e);
  } finally {
    setTimeout(() => {
      document.getElementById('loadingScreen').classList.add('hide');
      document.getElementById('app').style.display = 'block';
    }, 2000);
  }
}

async function loadEmployee(lineId) {
  try {
    const r = await fetch(`${API}/eslip/employee?lineId=${lineId}`);
    const d = await r.json();
    if (!d || d.error) {
      document.getElementById('profileName').textContent = 'ไม่พบข้อมูลพนักงาน';
      return;
    }
    empData = d;
    document.getElementById('profileName').textContent = d.name;
    document.getElementById('profilePos').textContent = d.position || '—';
    const badge = document.getElementById('profileBadge');
    badge.textContent = d.payType === 'daily' ? 'รายวัน' : 'รายเดือน';
    badge.className = 'profile-badge ' + (d.payType === 'daily' ? 'badge-daily' : 'badge-monthly');
    loadMonths('payslip');
  } catch(e) {
    document.getElementById('profileName').textContent = 'โหลดไม่สำเร็จ';
  }
}

// ── TABS ──────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabPayslip').classList.toggle('active', tab === 'payslip');
  document.getElementById('tabCert').classList.toggle('active', tab === 'certificate');
  document.getElementById('sectionTitle').textContent = tab === 'payslip' ? 'สลิปเงินเดือน' : 'ใบรับรองเงินเดือน';
  loadMonths(tab);
}

// ── LOAD MONTHS ───────────────────────────────────────
async function loadMonths(tab) {
  if (!empData) return;
  const list = document.getElementById('monthList');
  list.innerHTML = '<div class="skeleton sk-card"></div><div class="skeleton sk-card"></div><div class="skeleton sk-card"></div>';
  try {
    const r = await fetch(`${API}/eslip/months?lineId=${empData.lineId}&payType=${empData.payType}`);
    const months = await r.json();
    if (!months.length) {
      list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">ยังไม่มีข้อมูลในระบบ<br>กรุณาติดต่อ HR</div></div>';
      return;
    }
    list.innerHTML = months.map(m => `
      <div class="month-card" onclick="openDoc('${tab}','${m.month}')">
        <div class="month-icon">${tab === 'payslip' ? '💰' : '📋'}</div>
        <div class="month-info">
          <div class="month-name">${m.month}</div>
          ${m.netPay ? `<div class="month-net">฿${Number(m.netPay).toLocaleString('th-TH',{minimumFractionDigits:2})}</div>` : ''}
        </div>
        <div class="month-arrow">›</div>
      </div>`).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">โหลดไม่สำเร็จ</div></div>';
  }
}

// ── OPEN DOC ──────────────────────────────────────────
async function openDoc(docType, month) {
  if (!empData) return;
  currentDocData = { docType, month };
  document.getElementById('listView').style.display = 'none';
  document.getElementById('docView').classList.add('show');
  document.getElementById('actionBar').style.display = 'flex';
  document.getElementById('backLabel').textContent = docType === 'payslip' ? 'สลิปเงินเดือน' : 'ใบรับรองเงินเดือน';

  const render = document.getElementById('docRender');
  render.innerHTML = '<div style="padding:40px;text-align:center"><div class="skeleton" style="height:500px;border-radius:8px"></div></div>';

  try {
    // ดึง HTML จาก server (แค่ JSON เบาๆ)
    const r = await fetch(`${API}/eslip/doc?lineId=${empData.lineId}&docType=${docType}&month=${encodeURIComponent(month)}`);
    const data = await r.json();
    if (data.html) {
      // render HTML ใน browser โดยตรง — เร็วมาก ไม่ต้อง puppeteer
      render.innerHTML = data.html;
    } else {
      render.innerHTML = '<div style="padding:40px;text-align:center;color:#888">ไม่พบข้อมูล</div>';
    }
  } catch(e) {
    render.innerHTML = '<div style="padding:40px;text-align:center;color:#888">โหลดไม่สำเร็จ</div>';
  }
}

// ── BACK ──────────────────────────────────────────────
function goBack() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('docView').classList.remove('show');
  document.getElementById('actionBar').style.display = 'none';
}

// ── SAVE IMAGE (html2canvas — ทำใน browser เลย เร็วมาก) ──
async function saveImage() {
  const btn = document.getElementById('btnSave');
  btn.textContent = '⏳ กำลังสร้างรูป...';
  btn.classList.add('btn-disabled');
  try {
    const el = document.getElementById('docRender');
    const canvas = await html2canvas(el, {
      scale: 2,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
    });
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    // download
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = `สลิป_${currentDocData.month}.jpg`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    showToast('✅ บันทึกรูปสำเร็จ');
  } catch(e) {
    showToast('❌ บันทึกรูปไม่สำเร็จ: ' + e.message);
  } finally {
    btn.textContent = '💾 บันทึกรูป';
    btn.classList.remove('btn-disabled');
  }
}

// ── DOWNLOAD PDF ──────────────────────────────────────
async function downloadPdf() {
  const btn = document.getElementById('btnPdf');
  btn.textContent = '⏳ กำลังสร้าง PDF...';
  btn.classList.add('btn-disabled');
  try {
    showToast('⏳ กำลังสร้าง PDF...');
    const url = `${API}/eslip/pdf?lineId=${empData.lineId}&docType=${currentDocData.docType}&month=${encodeURIComponent(currentDocData.month)}`;
    window.open(url, '_blank');
  } catch(e) {
    showToast('❌ เกิดข้อผิดพลาด');
  } finally {
    btn.textContent = '📄 PDF';
    btn.classList.remove('btn-disabled');
  }
}

// ── TOAST ──────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── START ──────────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const debugLineId = urlParams.get('lineId');

if (urlParams.get('debug') === '1' && debugLineId) {
  document.getElementById('loadingScreen').classList.add('hide');
  document.getElementById('app').style.display = 'block';
  loadEmployee(debugLineId);
} else {
  init();
}
</script>
</body>
</html>
