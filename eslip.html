<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>TPE E-Slip</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{
  --bg:#0A0F1E;
  --bg2:#0F1629;
  --surface:#141B2D;
  --surface2:#1A2340;
  --border:rgba(255,255,255,.08);
  --gold:#F5A623;
  --gold2:#FFD166;
  --blue:#4F8EF7;
  --green:#06D6A0;
  --red:#EF476F;
  --purple:#7B61FF;
  --text:#F0F4FF;
  --muted:rgba(240,244,255,.45);
  --muted2:rgba(240,244,255,.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Sarabun','Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── LOADING ── */
.ls{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .4s,visibility .4s}
.ls.hide{opacity:0;visibility:hidden;pointer-events:none}
.ls-logo{width:88px;height:88px;border-radius:28px;background:linear-gradient(135deg,#1a0a00,#C9952A);display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:28px;box-shadow:0 0 60px rgba(245,166,35,.3);animation:ls-pulse 2s ease-in-out infinite}
@keyframes ls-pulse{0%,100%{box-shadow:0 0 60px rgba(245,166,35,.3)}50%{box-shadow:0 0 80px rgba(245,166,35,.6)}}
.ls-title{font-size:22px;font-weight:700;color:var(--text);letter-spacing:.02em}
.ls-sub{font-size:12px;color:var(--muted);margin-top:6px}
.ls-bar{width:160px;height:2px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:28px;overflow:hidden}
.ls-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;animation:ls-fill 1s ease forwards}
@keyframes ls-fill{to{width:100%}}

/* ── HEADER ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.hdr-inner{display:flex;align-items:center;gap:12px;padding:14px 18px}
.hdr-logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#1a0a00,#C9952A);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.hdr-info{flex:1}
.hdr-title{font-size:15px;font-weight:700;color:var(--text)}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px}
.hdr-avatar{width:34px;height:34px;border-radius:50%;border:2px solid rgba(245,166,35,.5);object-fit:cover;flex-shrink:0}

/* ── PROFILE HERO ── */
.hero{margin:16px 18px;border-radius:20px;background:linear-gradient(135deg,#1a2a4a 0%,#0f1a33 50%,#1a1040 100%);padding:20px;position:relative;overflow:hidden;border:1px solid var(--border)}
.hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(79,142,247,.2),transparent 70%)}
.hero::after{content:'';position:absolute;bottom:-40px;left:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(245,166,35,.1),transparent 70%)}
.hero-top{display:flex;align-items:center;gap:14px;position:relative}
.hero-avatar{width:56px;height:56px;border-radius:16px;object-fit:cover;border:2px solid rgba(245,166,35,.4);flex-shrink:0;background:var(--surface2)}
.hero-name{font-size:17px;font-weight:700;color:#fff}
.hero-pos{font-size:12px;color:var(--muted);margin-top:3px}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(6,214,160,.15);color:var(--green);border:1px solid rgba(6,214,160,.3);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;margin-top:6px}
.hero-badge.daily{background:rgba(79,142,247,.15);color:var(--blue);border-color:rgba(79,142,247,.3)}

/* ── TABS ── */
.tabs-wrap{padding:0 18px 14px}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;background:var(--surface);border-radius:14px;padding:5px;border:1px solid var(--border)}
.tab{padding:10px;border:none;border-radius:10px;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:var(--muted);background:transparent;display:flex;align-items:center;justify-content:center;gap:6px}
.tab.active{background:linear-gradient(135deg,#1a3a6a,#2a4f8a);color:#fff;box-shadow:0 4px 12px rgba(79,142,247,.3)}

/* ── MONTH LIST ── */
.list-wrap{padding:0 18px 100px}
.list-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.months{display:flex;flex-direction:column;gap:8px}
.month-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.month-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(79,142,247,.05),transparent);opacity:0;transition:opacity .2s}
.month-card:active::before{opacity:1}
.month-card:active{transform:scale(.98)}
.m-icon{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.m-icon-pay{background:linear-gradient(135deg,rgba(79,142,247,.2),rgba(79,142,247,.1));border:1px solid rgba(79,142,247,.2)}
.m-info{flex:1}
.m-name{font-size:14px;font-weight:600;color:var(--text)}
.m-net{font-size:13px;color:var(--green);font-weight:600;margin-top:2px}
.m-arrow{color:var(--muted2);font-size:18px;flex-shrink:0}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:52px;margin-bottom:14px;opacity:.6}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200%;animation:sk 1.4s infinite;border-radius:14px}
@keyframes sk{0%{background-position:200%}100%{background-position:-200%}}
.sk-h{height:72px;margin-bottom:8px}

/* ── DOC VIEW ── */
.doc-view{display:none;flex-direction:column;min-height:100vh;background:var(--bg)}
.doc-view.show{display:flex}
.doc-topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(20px)}
.back-btn{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text);font-size:16px;flex-shrink:0;transition:opacity .15s}
.back-btn:active{opacity:.6}
.doc-top-info{flex:1}
.doc-top-title{font-size:15px;font-weight:700;color:var(--text)}
.doc-top-month{font-size:11px;color:var(--muted);margin-top:2px}
.doc-scroll{flex:1;overflow-y:auto;padding:16px 18px 100px}

/* ── CERT CARD ── */
.cert-card{border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.cert-hero{background:linear-gradient(160deg,#2d1b69,#6C3483,#9B59B6);padding:28px 22px;position:relative;overflow:hidden}
.cert-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:180px;height:180px;background:rgba(255,255,255,.06);border-radius:50%}
.cert-hero::after{content:'';position:absolute;bottom:-60px;left:-30px;width:140px;height:140px;background:rgba(255,255,255,.04);border-radius:50%}
.cert-tag{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.9);font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:14px;letter-spacing:.05em}
.cert-emp-name{font-size:22px;font-weight:700;color:#fff;margin-bottom:4px;position:relative}
.cert-emp-pos{font-size:13px;color:rgba(255,255,255,.6);position:relative}
.cert-month{font-size:11px;color:rgba(255,255,255,.4);margin-top:12px;position:relative}

.cert-salary-section{background:var(--surface);padding:24px 22px;border-bottom:1px solid var(--border)}
.cert-salary-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.cert-salary-amount{font-size:38px;font-weight:800;color:var(--text);letter-spacing:-.5px;line-height:1}
.cert-salary-sub{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.6}
.cert-salary-badge{display:inline-block;background:rgba(155,89,182,.15);color:#C39BD3;border:1px solid rgba(155,89,182,.2);font-size:10px;font-weight:600;padding:2px 10px;border-radius:20px;margin-top:8px}

.cert-info-section{background:var(--surface);padding:20px 22px}
.cert-info-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.cert-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.cert-row:last-child{border-bottom:none}
.cert-row-label{font-size:13px;color:var(--muted)}
.cert-row-val{font-size:13px;font-weight:600;color:var(--text)}

.cert-footer{background:var(--surface2);padding:14px 22px;text-align:center;font-size:11px;color:var(--muted);border-top:1px solid var(--border)}

/* ── PAYSLIP CARD ── */
.pay-card{border-radius:20px;overflow:hidden;border:1px solid var(--border)}
.pay-hero{background:linear-gradient(160deg,#0a1628,#1a3a6a,#0f2040);padding:24px 22px;position:relative;overflow:hidden}
.pay-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(79,142,247,.15),transparent)}
.pay-tag{background:rgba(245,166,35,.15);backdrop-filter:blur(10px);border:1px solid rgba(245,166,35,.25);color:var(--gold);font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;display:inline-block;margin-bottom:14px;letter-spacing:.05em}
.pay-emp-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
.pay-emp-pos{font-size:13px;color:rgba(255,255,255,.5)}
.pay-month{font-size:11px;color:rgba(255,255,255,.35);margin-top:10px}

.pay-net-section{background:var(--surface);padding:22px;border-bottom:1px solid var(--border)}
.pay-net-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.pay-net-amount{font-size:36px;font-weight:800;color:var(--green);letter-spacing:-.5px}

.pay-body{background:var(--surface);padding:16px 22px}
.pay-section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;padding:12px 0 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.pay-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.pay-row:last-child{border-bottom:none}
.pay-row-label{font-size:13px;color:var(--muted)}
.pay-row-val{font-size:13px;font-weight:600}
.c-green{color:var(--green)}.c-red{color:var(--red)}.c-blue{color:var(--blue)}.c-text{color:var(--text)}
.pay-total-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-top:1px solid var(--border);margin-top:4px}
.pay-total-label{font-size:13px;font-weight:700;color:var(--text)}
.pay-total-val{font-size:15px;font-weight:700}

.pay-footer{background:var(--surface2);padding:14px 22px;text-align:center;font-size:11px;color:var(--muted);border-top:1px solid var(--border)}

/* ── ACTION BAR ── */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(10,15,30,.9);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:12px 18px;padding-bottom:calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;z-index:50}
.act-btn{flex:1;padding:14px;border-radius:14px;border:none;font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px}
.act-btn:active{transform:scale(.97)}
.btn-save{background:linear-gradient(135deg,#1a3a6a,#2a5fa0);color:#fff;box-shadow:0 4px 16px rgba(79,142,247,.3);border:1px solid rgba(79,142,247,.2)}
.btn-pdf{background:linear-gradient(135deg,#7a3500,#C9952A);color:#fff;box-shadow:0 4px 16px rgba(245,166,35,.3);border:1px solid rgba(245,166,35,.2)}
.btn-disabled{opacity:.5;pointer-events:none}

/* ── TOAST ── */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(255,255,255,.12);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.15);color:#fff;padding:10px 22px;border-radius:30px;font-size:13px;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="ls" id="loadingScreen">
  <div class="ls-logo">🏢</div>
  <div class="ls-title">TPE E-Slip</div>
  <div class="ls-sub">ธนพลเอ็นจิเนียริ่ง จำกัด</div>
  <div class="ls-bar"><div class="ls-fill"></div></div>
</div>

<div class="toast" id="toast"></div>

<div id="app" style="display:none">
  <div class="hdr">
    <div class="hdr-inner">
      <div class="hdr-logo">🏢</div>
      <div class="hdr-info">
        <div class="hdr-title">TPE E-Slip</div>
        <div class="hdr-sub">เอกสารเงินเดือนออนไลน์</div>
      </div>
      <img id="headerAvatar" class="hdr-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="listView">
    <div class="hero">
      <div class="hero-top">
        <img id="profileAvatar" class="hero-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
        <div>
          <div class="hero-name" id="profileName">กำลังโหลด...</div>
          <div class="hero-pos" id="profilePos">—</div>
          <div id="profileWorkAge" style="font-size:11px;color:var(--muted);margin-top:4px"></div>
          <div class="hero-badge badge-monthly" id="profileBadge">● รายเดือน</div>
        </div>
      </div>
    </div>

    <div class="tabs-wrap">
      <div class="tabs">
        <button class="tab active" id="tabPayslip" onclick="switchTab('payslip')">💰 สลิปเงินเดือน</button>
        <button class="tab" id="tabCert" onclick="switchTab('certificate')">📋 ใบรับรอง</button>
      </div>
    </div>

    <div class="list-wrap">
      <div class="list-title" id="listTitle">สลิปเงินเดือน</div>
      <div id="monthList">
        <div class="sk sk-h"></div>
        <div class="sk sk-h"></div>
        <div class="sk sk-h"></div>
      </div>
    </div>
  </div>

  <!-- DOC VIEW -->
  <div id="docView" class="doc-view">
    <div class="doc-topbar">
      <div class="back-btn" onclick="goBack()">←</div>
      <div class="doc-top-info">
        <div class="doc-top-title" id="docTitle">เอกสาร</div>
        <div class="doc-top-month" id="docMonth"></div>
      </div>
    </div>
    <div class="doc-scroll">
      <div id="docRender"></div>
    </div>
  </div>

  <!-- ACTION BAR -->
  <div class="action-bar" id="actionBar" style="display:none">
    <button class="act-btn btn-save" id="btnSave" onclick="saveImage()">💾 บันทึกรูป</button>
    <button class="act-btn btn-pdf" id="btnPdf" onclick="downloadPdf()">📄 PDF</button>
  </div>
</div>

<script>
const API='https://tpe-hr-bot.onrender.com';
const LIFF_ID='2010255039-6dQLsh35';
let currentTab='payslip',empData=null,currentDocData=null;

async function init(){
  const t=setTimeout(()=>{hide();document.getElementById('profileName').textContent='โหลดช้า กรุณารีเฟรช';},8000);
  try{
    await liff.init({liffId:LIFF_ID});
    if(!liff.isLoggedIn()){liff.login();return;}
    const p=await liff.getProfile();
    document.getElementById('headerAvatar').src=p.pictureUrl||'';
    document.getElementById('profileAvatar').src=p.pictureUrl||'';
    await loadEmployee(p.userId);
  }catch(e){document.getElementById('profileName').textContent='เกิดข้อผิดพลาด';}
  finally{clearTimeout(t);hide();}
}
function hide(){document.getElementById('loadingScreen').classList.add('hide');document.getElementById('app').style.display='block';}

async function loadEmployee(lineId){
  try{
    const r=await fetch(`${API}/eslip/employee?lineId=${lineId}`);
    const d=await r.json();
    if(!d||d.error){document.getElementById('profileName').textContent='ไม่พบข้อมูลพนักงาน';return;}
    empData=d;
    document.getElementById('profileName').textContent=d.name;
    document.getElementById('profilePos').textContent=d.position||'ไม่ระบุตำแหน่ง';

    // คำนวณอายุงาน
    let workAge='';
    if(d.startDate){
      try{
        const parts=d.startDate.split('/');
        const start=new Date(parseInt(parts[2])-543,parseInt(parts[1])-1,parseInt(parts[0]));
        const now=new Date();
        const months=Math.floor((now-start)/(1000*60*60*24*30.44));
        const y=Math.floor(months/12),m=months%12;
        workAge=y>0?(m>0?`${y} ปี ${m} เดือน`:`${y} ปี`):(m>0?`${m} เดือน`:'');
      }catch(e){}
    }
    document.getElementById('profileWorkAge').textContent=workAge?`⏱ อายุงาน ${workAge}`:'';

    const b=document.getElementById('profileBadge');
    b.textContent=d.payType==='daily'?'● รายวัน':'● รายเดือน';
    b.className='hero-badge'+(d.payType==='daily'?' daily':'');
    loadMonths('payslip');
  }catch(e){document.getElementById('profileName').textContent='โหลดไม่สำเร็จ';}
}

function switchTab(tab){
  currentTab=tab;
  document.getElementById('tabPayslip').classList.toggle('active',tab==='payslip');
  document.getElementById('tabCert').classList.toggle('active',tab==='certificate');
  if(tab==='certificate'){openCertDirect();}
  else{document.getElementById('listTitle').textContent='สลิปเงินเดือน';loadMonths('payslip');}
}

async function openCertDirect(){
  if(!empData)return;
  try{
    const r=await fetch(`${API}/eslip/months?lineId=${empData.lineId}&payType=${empData.payType}`);
    const months=await r.json();
    if(!months.length){showToast('⚠️ ยังไม่มีข้อมูลในระบบ');return;}
    openDoc('certificate',months[0].month);
  }catch(e){showToast('❌ โหลดไม่สำเร็จ');}
}

async function loadMonths(tab){
  if(!empData)return;
  const list=document.getElementById('monthList');
  list.innerHTML='<div class="sk sk-h"></div><div class="sk sk-h"></div><div class="sk sk-h"></div>';
  try{
    const r=await fetch(`${API}/eslip/months?lineId=${empData.lineId}&payType=${empData.payType}`);
    const months=await r.json();
    if(!months.length){list.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>ยังไม่มีข้อมูล<br>กรุณาติดต่อ HR</p></div>';return;}
    list.innerHTML=months.map(m=>`
      <div class="month-card" onclick="openDoc('payslip','${m.month}')">
        <div class="m-icon m-icon-pay">💰</div>
        <div class="m-info">
          <div class="m-name">${m.month}</div>
          ${m.netPay?`<div class="m-net">฿${Number(m.netPay).toLocaleString('th-TH',{minimumFractionDigits:2})}</div>`:''}
        </div>
        <div class="m-arrow">›</div>
      </div>`).join('');
  }catch(e){list.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>โหลดไม่สำเร็จ</p></div>';}
}

async function openDoc(docType,month){
  if(!empData)return;
  currentDocData={docType,month};
  document.getElementById('listView').style.display='none';
  document.getElementById('docView').classList.add('show');
  document.getElementById('actionBar').style.display='flex';
  document.getElementById('docTitle').textContent=docType==='payslip'?'สลิปเงินเดือน':'ใบรับรองเงินเดือน';
  document.getElementById('docMonth').textContent=month;
  const render=document.getElementById('docRender');
  render.innerHTML='<div style="padding:40px;text-align:center"><div class="sk" style="height:500px;border-radius:20px"></div></div>';
  try{
    const r=await fetch(`${API}/eslip/data?lineId=${empData.lineId}&docType=${docType}&month=${encodeURIComponent(month)}`);
    if(!r.ok)throw new Error('โหลดไม่สำเร็จ');
    const d=await r.json();
    if(!d||d.error)throw new Error(d?.error||'ไม่พบข้อมูล');
    render.innerHTML=docType==='certificate'?renderCert(d,month):renderPay(d,month);
  }catch(e){render.innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted)">⚠️ ${e.message}</div>`;}
}

function goBack(){
  document.getElementById('listView').style.display='block';
  document.getElementById('docView').classList.remove('show');
  document.getElementById('actionBar').style.display='none';
  if(currentDocData?.docType==='certificate'){
    currentTab='payslip';
    document.getElementById('tabPayslip').classList.add('active');
    document.getElementById('tabCert').classList.remove('active');
    document.getElementById('listTitle').textContent='สลิปเงินเดือน';
    loadMonths('payslip');
  }
}

function fmt(n){return(Math.round((parseFloat(n)||0)*100)/100).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2});}

function renderCert(d,month){
  const salary=d.payType==='daily'?(parseFloat(d.baseWage)||0)*26:(parseFloat(d.baseWage)||parseFloat(d.basePay)||0);
  const today=new Date();
  const thM=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const dateStr=`${today.getDate()} ${thM[today.getMonth()]} พ.ศ.${today.getFullYear()+543}`;
  return`<div class="cert-card">
    <div class="cert-hero">
      <div class="cert-tag">📋 ใบรับรองเงินเดือน</div>
      <div class="cert-emp-name">${d.name||'—'}</div>
      <div class="cert-emp-pos">${d.position||'—'}</div>
      <div class="cert-month">📅 ${month}</div>
    </div>
    <div class="cert-salary-section">
      <div class="cert-salary-title">${d.payType==='daily'?'เงินเดือน (ค่าแรง × 26 วัน)':'เงินเดือนฐาน'}</div>
      <div class="cert-salary-amount">฿${fmt(salary)}</div>
      <div class="cert-salary-sub">ยังไม่รวมค่าล่วงเวลาและเบี้ยเลี้ยง</div>
      <div class="cert-salary-badge">${d.payType==='daily'?'รายวัน':'รายเดือน'}</div>
    </div>
    <div class="cert-info-section">
      <div class="cert-info-title">ข้อมูลการจ้างงาน</div>
      <div class="cert-row"><span class="cert-row-label">ตำแหน่ง</span><span class="cert-row-val">${d.position||'—'}</span></div>
      <div class="cert-row"><span class="cert-row-label">ประเภทการจ้าง</span><span class="cert-row-val">${d.payType==='daily'?'รายวัน':'รายเดือน'}</span></div>
      ${d.startDate?`<div class="cert-row"><span class="cert-row-label">วันเริ่มงาน</span><span class="cert-row-val">${d.startDate}</span></div>`:''}
    </div>
    <div class="cert-footer">ออกให้ ณ วันที่ ${dateStr} · ธนพลเอ็นจิเนียริ่ง จำกัด</div>
  </div>`;
}

function renderPay(d,month){
  const row=(l,v,cls)=>{const n=parseFloat(v)||0;if(!n)return'';return`<div class="pay-row"><span class="pay-row-label">${l}</span><span class="pay-row-val ${cls||'c-text'}">${fmt(Math.abs(n))}</span></div>`;};
  return`<div class="pay-card">
    <div class="pay-hero">
      <div class="pay-tag">💰 สลิปเงินเดือน</div>
      <div class="pay-emp-name">${d.name||'—'}</div>
      <div class="pay-emp-pos">${d.position||'—'}</div>
      <div class="pay-month">📅 ${month}</div>
    </div>
    <div class="pay-net-section">
      <div class="pay-net-label">เงินได้สุทธิ</div>
      <div class="pay-net-amount">฿${fmt(d.netPay)}</div>
    </div>
    <div class="pay-body">
      <div class="pay-section-title">สถิติการทำงาน</div>
      ${row('วันทำงาน',d.workDays,'c-text')}
      ${row('OT (ชม.)',d.otH,'c-blue')}
      ${row('ลากิจ',d.leaveP,'c-text')}
      ${row('ลาป่วย',d.leaveSick,'c-text')}
      <div class="pay-section-title">รายได้</div>
      ${row('ค่าจ้างปกติ',d.basePay||d.baseWage,'c-green')}
      ${row('ค่า OT',d.otPay,'c-green')}
      ${row('เบี้ยเลี้ยง',d.allowance,'c-green')}
      ${row('เบี้ยขยัน',d.bonus,'c-green')}
      ${row('รายได้อื่นๆ',d.otherInc,'c-green')}
      <div class="pay-total-row"><span class="pay-total-label">รวมรายได้</span><span class="pay-total-val c-green">฿${fmt(d.totalInc)}</span></div>
      <div class="pay-section-title">รายการหัก</div>
      ${row('ประกันสังคม',d.soc,'c-red')}
      ${row('ภาษี ณ ที่จ่าย',d.tax,'c-red')}
      ${row('หักล่วงหน้า',d.advance,'c-red')}
      ${row('กยศ.',d.kot,'c-red')}
      ${row('รายการหักอื่นๆ',d.otherDed,'c-red')}
      <div class="pay-total-row"><span class="pay-total-label">รวมหัก</span><span class="pay-total-val c-red">฿${fmt(d.totalDed)}</span></div>
    </div>
    <div class="pay-net-section" style="background:rgba(6,214,160,.05);border-top:1px solid rgba(6,214,160,.15)">
      <div class="pay-net-label" style="color:var(--green)">เงินได้สุทธิ</div>
      <div class="pay-net-amount">฿${fmt(d.netPay)}</div>
    </div>
    <div class="pay-footer">สร้างโดยระบบ HR อัตโนมัติ · ธนพลเอ็นจิเนียริ่ง จำกัด</div>
  </div>`;
}

async function logError(step,msg){try{await fetch(`${API}/eslip/log`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({step,message:msg,ua:navigator.userAgent,lineId:empData?.lineId||'?',time:new Date().toISOString()})});}catch(e){}}

async function saveImage(){
  const btn=document.getElementById('btnSave');
  if(!btn||!currentDocData||!empData)return;
  btn.textContent='⏳ กำลังสร้างรูป...';btn.classList.add('btn-disabled');
  try{
    const r=await fetch(`${API}/eslip/doc?lineId=${empData.lineId}&docType=${currentDocData.docType}&month=${encodeURIComponent(currentDocData.month)}`);
    if(!r.ok)throw new Error('โหลดไม่สำเร็จ ('+r.status+')');
    const data=await r.json();
    if(!data.html)throw new Error(data.error||'ไม่พบข้อมูล');
    const w=document.createElement('div');
    w.style.cssText='position:fixed;left:-9999px;top:0;width:794px;background:#fff;z-index:-1';
    w.innerHTML=data.html;document.body.appendChild(w);
    await document.fonts.ready;
    await new Promise(r=>setTimeout(r,600));
    const canvas=await html2canvas(w,{scale:2,useCORS:true,allowTaint:true,backgroundColor:'#ffffff',width:794,windowWidth:794,height:w.scrollHeight,windowHeight:w.scrollHeight,logging:false});
    document.body.removeChild(w);
    const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',0.92));
    if(!blob)throw new Error('สร้างรูปไม่สำเร็จ');
    const filename='สลิป_'+currentDocData.month+'.jpg';
    const file=new File([blob],filename,{type:'image/jpeg'});
    const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
    if(isIOS&&navigator.share&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:filename});showToast('✅ บันทึกรูปสำเร็จ');return;}
    const isInLiff=typeof liff!=='undefined'&&liff.isInClient&&liff.isInClient();
    if(isInLiff){
      const fd=new FormData();fd.append('file',blob,filename);
      const up=await fetch(`${API}/eslip/temp-image`,{method:'POST',body:fd});
      const ud=await up.json();if(!ud.url)throw new Error('upload failed');
      liff.openWindow({url:ud.url,external:true});showToast('📱 กดปุ่มบันทึกในหน้าที่เปิด');return;
    }
    const objUrl=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=objUrl;a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(objUrl),3000);showToast('✅ บันทึกรูปสำเร็จ');
  }catch(e){
    await logError('saveImage_ERROR',e.name+': '+e.message);
    if(e.name==='AbortError')showToast('ยกเลิกการบันทึก');else showToast('❌ '+e.message);
  }finally{btn.textContent='💾 บันทึกรูป';btn.classList.remove('btn-disabled');}
}

async function downloadPdf(){
  if(!currentDocData||!empData)return;
  const btn=document.getElementById('btnPdf');
  btn.textContent='⏳ กำลังสร้าง PDF...';btn.classList.add('btn-disabled');
  try{
    const url=`${API}/eslip/pdf?lineId=${empData.lineId}&docType=${currentDocData.docType}&month=${encodeURIComponent(currentDocData.month)}`;
    const win=window.open(url,'_blank');
    if(!win){const a=document.createElement('a');a.href=url;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);}
    showToast('📄 กำลังเปิด PDF...');
  }catch(e){showToast('❌ '+e.message);}
  finally{btn.textContent='📄 PDF';btn.classList.remove('btn-disabled');}
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

const urlParams=new URLSearchParams(window.location.search);
const debugLineId=urlParams.get('lineId');
if(urlParams.get('debug')==='1'&&debugLineId){hide();loadEmployee(debugLineId);}
else{init();}
