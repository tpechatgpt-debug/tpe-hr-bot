<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TPE E-Slip</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
<style>
:root {
  --navy: #1E3A5F;
  --navy-dark: #132540;
  --navy-light: #2a4f80;
  --gold: #C9952A;
  --gold-light: #E8B84B;
  --gold-pale: #FDF5E8;
  --bg: #F0EDE8;
  --surface: #FDFCFA;
  --border: #E2DAD0;
  --text: #1a1a1a;
  --muted: #7A7368;
  --green: #1B7F4E;
  --red: #C0392B;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Sarabun', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── LOADING ── */
.loading-screen {
  position: fixed; inset: 0;
  background: var(--navy-dark);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999;
  transition: opacity .4s, visibility .4s;
}
.loading-screen.hide { opacity: 0; visibility: hidden; }
.loading-logo {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #2C1A00, #C9952A);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(201,149,42,.3);
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.loading-logo img { width: 48px; height: 48px; object-fit: contain; border-radius: 8px; }
.loading-text { color: rgba(255,255,255,.7); font-size: 14px; letter-spacing: .05em; }
.loading-bar {
  width: 120px; height: 3px;
  background: rgba(255,255,255,.1);
  border-radius: 2px; margin-top: 16px; overflow: hidden;
}
.loading-bar-fill {
  height: 100%; background: var(--gold);
  border-radius: 2px; width: 0%;
  animation: loading 1.8s ease forwards;
}
@keyframes loading { to { width: 100%; } }

/* ── HEADER ── */
.header {
  background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-light) 100%);
  padding: 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,.2);
}
.header-inner {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
}
.header-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #2C1A00, #C9952A);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.header-logo img { width: 28px; height: 28px; object-fit: contain; border-radius: 5px; }
.header-info { flex: 1; min-width: 0; }
.header-title { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.2; }
.header-sub { color: var(--gold-light); font-size: 11px; margin-top: 1px; opacity: .9; }
.header-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 2px solid rgba(201,149,42,.5);
  object-fit: cover;
  flex-shrink: 0;
}
.gold-line {
  height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
}

/* ── PROFILE CARD ── */
.profile-section { padding: 16px 16px 0; }
.profile-card {
  background: var(--surface);
  border-radius: 16px;
  padding: 16px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
  display: flex; align-items: center; gap: 14px;
}
.profile-avatar {
  width: 54px; height: 54px;
  border-radius: 14px;
  object-fit: cover;
  border: 2px solid var(--gold-pale);
  flex-shrink: 0;
}
.profile-info { flex: 1; min-width: 0; }
.profile-name { font-size: 16px; font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.profile-pos { font-size: 12px; color: var(--muted); margin-top: 2px; }
.profile-badge {
  font-size: 10px; font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px; margin-top: 5px; display: inline-block;
}
.badge-monthly { background: #E8F5EE; color: var(--green); }
.badge-daily { background: #EEF4FF; color: var(--navy); }

/* ── TABS ── */
.tabs { padding: 16px 16px 0; }
.tab-bar {
  display: flex; gap: 8px;
  background: var(--surface);
  padding: 4px;
  border-radius: 12px;
  border: 1px solid var(--border);
}
.tab-btn {
  flex: 1; padding: 9px 12px;
  border: none; border-radius: 9px;
  font-family: 'Sarabun', sans-serif;
  font-size: 13px; font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  color: var(--muted); background: transparent;
}
.tab-btn.active {
  background: var(--navy);
  color: #fff;
  box-shadow: 0 2px 8px rgba(30,58,95,.3);
}

/* ── MONTH LIST ── */
.content { padding: 12px 16px 80px; }
.section-title {
  font-size: 11px; font-weight: 600;
  color: var(--muted); letter-spacing: .08em;
  text-transform: uppercase; margin-bottom: 10px; margin-top: 4px;
}
.month-list { display: flex; flex-direction: column; gap: 8px; }
.month-card {
  background: var(--surface);
  border-radius: 14px;
  border: 1px solid var(--border);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  cursor: pointer;
  transition: all .18s;
  box-shadow: 0 1px 6px rgba(0,0,0,.04);
  -webkit-tap-highlight-color: transparent;
  text-decoration: none; color: inherit;
}
.month-card:active { transform: scale(.98); background: var(--gold-pale); }
.month-icon {
  width: 42px; height: 42px;
  border-radius: 11px;
  background: linear-gradient(135deg, var(--navy), var(--navy-light));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.month-info { flex: 1; min-width: 0; }
.month-name { font-size: 14px; font-weight: 600; color: var(--text); }
.month-net { font-size: 13px; color: var(--green); font-weight: 600; margin-top: 2px; }
.month-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; }

/* ── EMPTY STATE ── */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted);
}
.empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-text { font-size: 14px; line-height: 1.6; }

/* ── DOC VIEW ── */
.doc-view { display: none; }
.doc-view.show { display: block; }
.back-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  cursor: pointer;
  color: var(--navy); font-weight: 600; font-size: 14px;
}
.back-bar:active { opacity: .7; }
.doc-frame-wrap { padding: 0 16px 16px; }
.doc-frame {
  background: #fff;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
}

/* ── ACTION BUTTONS ── */
.action-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  display: flex; gap: 10px;
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
  z-index: 50;
}
.action-btn {
  flex: 1; padding: 13px 16px;
  border-radius: 12px;
  border: none;
  font-family: 'Sarabun', sans-serif;
  font-size: 13px; font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.action-btn:active { transform: scale(.97); }
.btn-save {
  background: var(--navy);
  color: #fff;
  box-shadow: 0 3px 12px rgba(30,58,95,.3);
}
.btn-pdf {
  background: var(--gold);
  color: #fff;
  box-shadow: 0 3px 12px rgba(201,149,42,.3);
}

/* ── TOAST ── */
.toast {
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px);
  background: var(--navy-dark); color: #fff;
  padding: 10px 20px; border-radius: 30px;
  font-size: 13px; font-weight: 500;
  opacity: 0; transition: all .3s; z-index: 999;
  white-space: nowrap;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── SKELETON ── */
.skeleton {
  background: linear-gradient(90deg, #f0ede8 25%, #e8e4df 50%, #f0ede8 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
.sk-card {
  height: 72px; border-radius: 14px; margin-bottom: 8px;
}
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-logo">
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAABGdBTUEAALGPC/xhBQAAAAlwSFlzAAAOwAAADsABataJCQAAAVlpVFh0WE1MOmNvbS5hZG9iZS54bXAAAAAAADx4OnhtcG1ldGEgeG1sbnM6eD0iYWRvYmU6bnM6bWV0YS8iIHg6eG1wdGs9IlhNUCBDb3JlIDUuNC4wIj4KICAgPHJkZjpSREYgeG1sbnM6cmRmPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5LzAyLzIyLXJkZi1zeW50YXgtbnMjIj4KICAgICAgPHJkZjpEZXNjcmlwdGlvbiByZGY6YWJvdXQ9IiIKICAgICAgICAgICAgeG1sbnM6dGlmZj0iaHR0cDovL25zLmFkb2JlLmNvbS90aWZmLzEuMC8iPgogICAgICAgICA8dGlmZjpPcmllbnRhdGlvbj4xPC90aWZmOk9yaWVudGF0aW9uPgogICAgICA8L3JkZjpEZXNjcmlwdGlvbj4KICAgPC9yZGY6UkRGPgo8L3g6eG1wbWV0YT4KTMInWQAAAVVJREFUeAHtmkEKwkAMRdu6du8BPIIHcO/Oo3gB8QAeQD2B4MKF+/+B4EIEQbBS0EWLqJAm8xLSJiRZ+GRmkiaTvBASgiAIgiAIgiAIggAAvPcRgDMAIBQBAAAAAElFTkSuQmCC" alt="logo">
  </div>
  <div class="loading-text">TPE E-Slip</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

  <!-- HEADER -->
  <div class="header">
    <div class="header-inner">
      <div class="header-logo">
        <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAEAAAABACAYAAACqaXHeAAAABGdBTUEAALGPC/xhBQAAAAlwSFlzAAAOwAAADsABataJCQAAAVlpVFh0WE1MOmNvbS5hZG9iZS54bXAAAAAAADx4OnhtcG1ldGEgeG1sbnM6eD0iYWRvYmU6bnM6bWV0YS8iIHg6eG1wdGs9IlhNUCBDb3JlIDUuNC4wIj4KICAgPHJkZjpSREYgeG1sbnM6cmRmPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5LzAyLzIyLXJkZi1zeW50YXgtbnMjIj4KICAgICAgPHJkZjpEZXNjcmlwdGlvbiByZGY6YWJvdXQ9IiIKICAgICAgICAgICAgeG1sbnM6dGlmZj0iaHR0cDovL25zLmFkb2JlLmNvbS90aWZmLzEuMC8iPgogICAgICAgICA8dGlmZjpPcmllbnRhdGlvbj4xPC90aWZmOk9yaWVudGF0aW9uPgogICAgICA8L3JkZjpEZXNjcmlwdGlvbj4KICAgPC9yZGY6UkRGPgo8L3g6eG1wbWV0YT4KTMInWQAAAVVJREFUeAHtmkEKwkAMRdu6du8BPIIHcO/Oo3gB8QAeQD2B4MKF+/+B4EIEQbBS0EWLqJAm8xLSJiRZ+GRmkiaTvBASgiAIgiAIgiAIggAAvPcRgDMAIBQBAAAAAElFTkSuQmCC" alt="logo">
      </div>
      <div class="header-info">
        <div class="header-title">TPE E-Slip</div>
        <div class="header-sub">ธนพลเอ็นจิเนียริ่ง จำกัด</div>
      </div>
      <img id="headerAvatar" class="header-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="avatar">
    </div>
    <div class="gold-line"></div>
  </div>

  <!-- LIST VIEW -->
  <div id="listView">
    <div class="profile-section">
      <div class="profile-card">
        <img id="profileAvatar" class="profile-avatar" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="avatar">
        <div class="profile-info">
          <div class="profile-name" id="profileName">กำลังโหลด...</div>
          <div class="profile-pos" id="profilePos">—</div>
          <span class="profile-badge badge-monthly" id="profileBadge">รายเดือน</span>
        </div>
      </div>
    </div>

    <div class="tabs">
      <div class="tab-bar">
        <button class="tab-btn active" id="tabPayslip" onclick="switchTab('payslip')">📋 สลิปเงินเดือน</button>
        <button class="tab-btn" id="tabCert" onclick="switchTab('certificate')">📄 ใบรับรอง</button>
      </div>
    </div>

    <div class="content">
      <div class="section-title" id="sectionTitle">สลิปเงินเดือน</div>
      <div id="monthList">
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
        <div class="skeleton sk-card"></div>
      </div>
    </div>
  </div>

  <!-- DOC VIEW -->
  <div id="docView" class="doc-view">
    <div class="back-bar" onclick="goBack()">
      ← <span id="backLabel">กลับ</span>
    </div>
    <div class="doc-frame-wrap">
      <div class="doc-frame" id="docFrame"></div>
    </div>
  </div>

  <!-- ACTION BAR (doc view only) -->
  <div class="action-bar" id="actionBar" style="display:none">
    <button class="action-btn btn-save" onclick="saveImage()">💾 บันทึกรูป</button>
    <button class="action-btn btn-pdf" onclick="downloadPdf()">📄 ดาวน์โหลด PDF</button>
  </div>

</div>

<script>
const API = 'https://tpe-hr-bot.onrender.com';
const LIFF_ID = '2010255039-6dQLsh35';

let currentTab = 'payslip';
let userProfile = null;
let empData = null;
let currentDocData = null;
let currentMonth = null;

// ── INIT ──
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }

    const profile = await liff.getProfile();
    userProfile = profile;

    // set avatars
    document.getElementById('headerAvatar').src = profile.pictureUrl || '';
    document.getElementById('profileAvatar').src = profile.pictureUrl || '';

    // load employee data
    const res = await fetch(`${API}/eslip/employee?lineId=${profile.userId}`);
    const data = await res.json();

    if (!data || data.error) {
      document.getElementById('profileName').textContent = profile.displayName;
      document.getElementById('profilePos').textContent = 'ไม่พบข้อมูลพนักงาน';
      showMonths([]);
    } else {
      empData = data;
      document.getElementById('profileName').textContent = data.name;
      document.getElementById('profilePos').textContent = data.position || '—';
      const badge = document.getElementById('profileBadge');
      badge.textContent = data.payType === 'daily' ? 'รายวัน' : 'รายเดือน';
      badge.className = 'profile-badge ' + (data.payType === 'daily' ? 'badge-daily' : 'badge-monthly');
      loadMonths('payslip');
    }

  } catch(e) {
    console.error(e);
    document.getElementById('profileName').textContent = 'เกิดข้อผิดพลาด';
  } finally {
    // hide loading
    setTimeout(() => {
      document.getElementById('loadingScreen').classList.add('hide');
      document.getElementById('app').style.display = 'block';
    }, 1800);
  }
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabPayslip').classList.toggle('active', tab === 'payslip');
  document.getElementById('tabCert').classList.toggle('active', tab === 'certificate');
  document.getElementById('sectionTitle').textContent = tab === 'payslip' ? 'สลิปเงินเดือน' : 'ใบรับรองเงินเดือน';
  loadMonths(tab);
}

// ── LOAD MONTHS ──
async function loadMonths(tab) {
  if (!empData) return;
  const list = document.getElementById('monthList');
  list.innerHTML = '<div class="skeleton sk-card"></div><div class="skeleton sk-card"></div><div class="skeleton sk-card"></div>';

  try {
    const res = await fetch(`${API}/eslip/months?lineId=${empData.lineId}&payType=${empData.payType}`);
    const months = await res.json();

    if (!months.length) {
      list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">ยังไม่มีข้อมูลในระบบ<br>กรุณาติดต่อ HR</div></div>`;
      return;
    }

    list.innerHTML = months.map(m => `
      <div class="month-card" onclick="openDoc('${tab}','${m.month}')">
        <div class="month-icon">${tab === 'payslip' ? '💰' : '📋'}</div>
        <div class="month-info">
          <div class="month-name">${m.month}</div>
          ${m.netPay ? `<div class="month-net">฿${Number(m.netPay).toLocaleString('th-TH', {minimumFractionDigits:2})}</div>` : ''}
        </div>
        <div class="month-arrow">›</div>
      </div>
    `).join('');
  } catch(e) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">โหลดข้อมูลไม่สำเร็จ</div></div>';
  }
}

// ── OPEN DOC ──
async function openDoc(docType, month) {
  if (!empData) return;
  currentMonth = month;
  currentDocData = { docType, month };

  document.getElementById('listView').style.display = 'none';
  document.getElementById('docView').classList.add('show');
  document.getElementById('actionBar').style.display = 'flex';
  document.getElementById('backLabel').textContent = docType === 'payslip' ? 'สลิปเงินเดือน' : 'ใบรับรองเงินเดือน';
  document.getElementById('docFrame').innerHTML = '<div style="padding:40px;text-align:center;color:#888"><div class="skeleton" style="height:400px;border-radius:8px"></div></div>';

  try {
    const res = await fetch(`${API}/eslip/doc?lineId=${empData.lineId}&docType=${docType}&month=${encodeURIComponent(month)}`);
    const data = await res.json();
    if (data.html) {
      document.getElementById('docFrame').innerHTML = data.html;
    } else {
      document.getElementById('docFrame').innerHTML = '<div style="padding:40px;text-align:center;color:#888">ไม่พบข้อมูล</div>';
    }
  } catch(e) {
    document.getElementById('docFrame').innerHTML = '<div style="padding:40px;text-align:center;color:#888">โหลดไม่สำเร็จ</div>';
  }
}

// ── BACK ──
function goBack() {
  document.getElementById('listView').style.display = 'block';
  document.getElementById('docView').classList.remove('show');
  document.getElementById('actionBar').style.display = 'none';
}

// ── SAVE IMAGE ──
async function saveImage() {
  showToast('⏳ กำลังบันทึกรูป...');
  try {
    const res = await fetch(`${API}/eslip/image?lineId=${empData.lineId}&docType=${currentDocData.docType}&month=${encodeURIComponent(currentMonth)}`);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `สลิป_${currentMonth}.jpg`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✅ บันทึกรูปสำเร็จ');
  } catch(e) {
    showToast('❌ บันทึกรูปไม่สำเร็จ');
  }
}

// ── DOWNLOAD PDF ──
async function downloadPdf() {
  showToast('⏳ กำลังสร้าง PDF...');
  try {
    const url = `${API}/eslip/pdf?lineId=${empData.lineId}&docType=${currentDocData.docType}&month=${encodeURIComponent(currentMonth)}`;
    window.open(url, '_blank');
    showToast('✅ เปิด PDF สำเร็จ');
  } catch(e) {
    showToast('❌ เกิดข้อผิดพลาด');
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── START ──
init();
</script>
</body>
