<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TPE Job Queue Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F5F6F8;--surface:#FFF;--border:#E4E7EC;--border2:#CDD2DB;
  --navy:#1A3358;--gold:#C9952A;--gold2:#F5B945;--green:#16A765;--green-bg:#EAF7F0;
  --amber:#D97706;--amber-bg:#FEF3C7;--red:#DC2626;--blue:#2563EB;--blue-bg:#EFF6FF;
  --text:#111827;--text2:#374151;--text3:#6B7280;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.05);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topbar{background:var(--navy);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:15px}
.topbar-name{font-size:15px;font-weight:700;color:#fff}
.topbar-sub{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-time{font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(255,255,255,.5)}
.btn-refresh{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:6px 14px;font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-refresh:hover{background:rgba(255,255,255,.18)}
.btn-refresh.spinning svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.main{padding:20px 24px 32px;max-width:1440px;margin:0 auto}
.section-title{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:900px){.cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.cards-grid{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card-busy::before{background:var(--amber)}
.card-free::before{background:var(--green)}
.card-queue::before{background:var(--blue)}
.card-total::before{background:var(--navy)}
.card-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.card-val{font-size:36px;font-weight:700;line-height:1;color:var(--text)}
.card-sub{font-size:12px;color:var(--text3);margin-top:6px}
.card-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.12}
.gantt-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);margin-bottom:24px;overflow:hidden}
.gantt-controls{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.gantt-nav{display:flex;align-items:center;gap:6px}
.gantt-nav-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.gantt-nav-btn:hover{background:var(--border)}
.gantt-month-label{font-size:13px;font-weight:700;color:var(--text);min-width:120px;text-align:center}
.gantt-scroll{overflow-x:auto}
.gantt-inner{min-width:800px}
.gantt-header{display:flex;border-bottom:1px solid var(--border);background:var(--bg)}
.gantt-team-col{width:140px;flex-shrink:0;padding:8px 16px;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;border-right:1px solid var(--border)}
.gantt-days{flex:1;display:flex}
.gantt-day-hdr{flex:1;text-align:center;font-size:10px;font-weight:600;color:var(--text3);padding:4px 0;border-right:1px solid var(--border);min-width:28px}
.gantt-day-hdr.today{color:var(--navy);font-weight:700;background:rgba(26,51,88,.05)}
.gantt-day-hdr.weekend{color:var(--red);background:rgba(220,38,38,.03)}
.gantt-row{display:flex;border-bottom:1px solid var(--border);min-height:44px}
.gantt-row:last-child{border-bottom:none}
.gantt-row:hover{background:rgba(26,51,88,.02)}
.gantt-team-label{width:140px;flex-shrink:0;padding:8px 16px;border-right:1px solid var(--border);display:flex;align-items:center;gap:8px}
.team-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.team-name{font-size:12px;font-weight:600;color:var(--text)}
.gantt-cells{flex:1;display:flex;position:relative}
.gantt-cell{flex:1;min-width:28px;border-right:1px solid var(--border);position:relative}
.gantt-cell.weekend{background:rgba(220,38,38,.03)}
.gantt-cell.today{background:rgba(26,51,88,.05)}
.gantt-bar{position:absolute;top:6px;bottom:6px;border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;font-weight:600;color:#fff;overflow:hidden;white-space:nowrap;cursor:pointer;transition:opacity .15s;z-index:2}
.gantt-bar:hover{opacity:.85}
.gantt-empty{padding:40px;text-align:center;color:var(--text3);font-size:13px}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.table-search{flex:1;min-width:160px;border:1px solid var(--border2);border-radius:8px;padding:7px 12px;font-family:'IBM Plex Sans Thai',sans-serif;font-size:13px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.table-search:focus{border-color:var(--navy)}
.filter-select{border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-family:'IBM Plex Sans Thai',sans-serif;font-size:12px;color:var(--text);background:var(--bg);outline:none;cursor:pointer}
.table-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--bg);padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap}
tbody td{padding:11px 16px;border-bottom:1px solid var(--border);color:var(--text2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(26,51,88,.02)}
.td-job{font-weight:600;color:var(--navy);font-family:'IBM Plex Mono',monospace;font-size:12px}
.td-company{font-weight:500}
.td-date{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text3);white-space:nowrap}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;white-space:nowrap}
.badge-plan{background:var(--blue-bg);color:var(--blue)}
.badge-doing{background:var(--amber-bg);color:var(--amber)}
.badge-done{background:var(--green-bg);color:var(--green)}
.badge-team{background:var(--bg);border:1px solid var(--border2);color:var(--text2)}
.td-members{font-size:11px;color:var(--text3);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tooltip{position:fixed;z-index:999;background:var(--navy);color:#fff;border-radius:8px;padding:10px 14px;font-size:12px;line-height:1.6;box-shadow:var(--shadow-md);pointer-events:none;opacity:0;transition:opacity .15s;max-width:280px}
.tooltip.show{opacity:1}
.tooltip-title{font-weight:700;font-size:13px;margin-bottom:4px}
.loading-wrap{display:flex;align-items:center;justify-content:center;min-height:200px;gap:10px;color:var(--text3);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite}
.empty-wrap{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-icon{font-size:40px;margin-bottom:12px;opacity:.4}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-left:auto}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3)}
.legend-dot{width:10px;height:10px;border-radius:3px}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-brand">
    <div class="topbar-logo">🏗</div>
    <div>
      <div class="topbar-name">TPE Job Queue</div>
      <div class="topbar-sub">ธนพลเอ็นจิเนียริ่ง จำกัด</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="topbar-time" id="clock">—</div>
    <button class="btn-refresh" id="btnRefresh" onclick="loadData()">
      <svg id="refreshIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12a9 9 0 11-6.219-8.56"/><path d="M21 3v5h-5"/>
      </svg>
      รีเฟรช
    </button>
  </div>
</div>

<div class="main">
  <div class="section-title">ภาพรวมชุดช่าง</div>
  <div class="cards-grid">
    <div class="card card-busy"><div class="card-label">ออกหน้างานวันนี้</div><div class="card-val" id="cBusy">—</div><div class="card-sub">ชุด</div><div class="card-icon">🔧</div></div>
    <div class="card card-free"><div class="card-label">ว่างวันนี้</div><div class="card-val" id="cFree">—</div><div class="card-sub">ชุด</div><div class="card-icon">✅</div></div>
    <div class="card card-queue"><div class="card-label">งานรอ Queue</div><div class="card-val" id="cQueue">—</div><div class="card-sub">งาน</div><div class="card-icon">📋</div></div>
    <div class="card card-total"><div class="card-label">งานทั้งหมด</div><div class="card-val" id="cTotal">—</div><div class="card-sub">รายการ</div><div class="card-icon">📁</div></div>
  </div>

  <div class="section-title">Timeline คิวงาน</div>
  <div class="gantt-wrap">
    <div class="gantt-controls">
      <div class="gantt-nav">
        <button class="gantt-nav-btn" onclick="shiftMonth(-1)">‹</button>
        <div class="gantt-month-label" id="ganttMonthLabel">—</div>
        <button class="gantt-nav-btn" onclick="shiftMonth(1)">›</button>
      </div>
      <button class="gantt-nav-btn" onclick="goToday()" style="width:auto;padding:0 10px;font-size:11px;font-weight:600;color:var(--navy)">วันนี้</button>
      <div class="legend" id="ganttLegend"></div>
    </div>
    <div class="gantt-scroll">
      <div class="gantt-inner" id="ganttInner">
        <div class="loading-wrap"><div class="spinner"></div> กำลังโหลด...</div>
      </div>
    </div>
  </div>

  <div class="section-title">รายการงานทั้งหมด</div>
  <div class="table-wrap">
    <div class="table-header">
      <input class="table-search" id="searchInput" placeholder="🔍  ค้นหางาน บริษัท จังหวัด สมาชิก..." oninput="renderTable()">
      <select class="filter-select" id="filterTeam" onchange="renderTable()">
        <option value="">ทุกชุด</option>
      </select>
      <select class="filter-select" id="filterStatus" onchange="renderTable()">
        <option value="">ทุกสถานะ</option>
        <option value="วางแผน">วางแผน</option>
        <option value="กำลังทำ">กำลังทำ</option>
        <option value="เสร็จแล้ว">เสร็จแล้ว</option>
      </select>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>ชุด</th><th>JOB No.</th><th>บริษัท / ลูกค้า</th><th>จังหวัด</th>
            <th>รายละเอียด</th><th>วันเริ่ม</th><th>วันสิ้นสุด</th><th>สถานะ</th>
            <th>👥 สมาชิก</th><th>รถ</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="10"><div class="loading-wrap"><div class="spinner"></div> กำลังโหลด...</div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>
const API='https://tpe-hr-bot.onrender.com';
let allData=[];
let ganttYear=new Date().getFullYear();
let ganttMonth=new Date().getMonth();
const TEAM_COLORS=['#1A3358','#C9952A','#16A765','#2563EB','#7C3AED','#DC2626','#0891B2','#D97706'];

// ── แยกสีตามชุด ──
function getTeamColor(team){
  const teams=[...new Set(allData.map(a=>a.team).filter(Boolean))].sort();
  const idx=teams.indexOf(team);
  return TEAM_COLORS[idx%TEAM_COLORS.length]||'#6B7280';
}

function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleString('th-TH',{timeZone:'Asia/Bangkok',hour:'2-digit',minute:'2-digit',second:'2-digit',day:'2-digit',month:'short'});
}
setInterval(updateClock,1000);updateClock();

function tsToDate(ts){
  if(!ts)return null;
  const d=new Date(ts+7*3600000);
  return new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate()));
}
function fmtDate(ts){
  if(!ts)return'—';
  const d=tsToDate(ts);
  return`${String(d.getUTCDate()).padStart(2,'0')}/${String(d.getUTCMonth()+1).padStart(2,'0')}/${d.getUTCFullYear()+543}`;
}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate()}
function isWeekend(y,m,d){const day=new Date(y,m,d).getDay();return day===0||day===6}

async function loadData(){
  const btn=document.getElementById('btnRefresh');
  btn.classList.add('spinning');
  try{
    const r=await fetch(`${API}/api/dashboard`);
    const d=await r.json();
    if(!d.ok)throw new Error(d.error||'error');
    allData=d.assignments||[];
    updateCards();renderGantt();renderTable();updateTeamFilter();
  }catch(e){
    document.getElementById('ganttInner').innerHTML=`<div class="empty-wrap"><div class="empty-icon">⚠️</div><p>โหลดไม่สำเร็จ: ${e.message}</p></div>`;
    document.getElementById('tableBody').innerHTML=`<tr><td colspan="10"><div class="empty-wrap"><div class="empty-icon">⚠️</div><p>${e.message}</p></div></td></tr>`;
  }finally{btn.classList.remove('spinning')}
}

function updateCards(){
  const todayStr=new Date().toLocaleDateString('en-CA',{timeZone:'Asia/Bangkok'});
  const todayMs=new Date(todayStr).getTime();
  const tomorrowMs=todayMs+86400000;
  const teams=[...new Set(allData.map(a=>a.team).filter(Boolean))];
  let busy=0,free=0,queue=0;
  teams.forEach(team=>{
    const teamJobs=allData.filter(a=>a.team===team);
    const activeToday=teamJobs.some(a=>{
      if(!a.startDate||!a.endDate)return false;
      return a.startDate<=todayMs && tomorrowMs<=a.endDate+86400000;
    });
    if(activeToday)busy++;else free++;
  });
  queue=allData.filter(a=>a.startDate&&a.startDate>tomorrowMs).length;
  document.getElementById('cBusy').textContent=busy;
  document.getElementById('cFree').textContent=free;
  document.getElementById('cQueue').textContent=queue;
  document.getElementById('cTotal').textContent=allData.length;
}

function shiftMonth(delta){
  ganttMonth+=delta;
  if(ganttMonth>11){ganttMonth=0;ganttYear++}
  if(ganttMonth<0){ganttMonth=11;ganttYear--}
  renderGantt();
}
function goToday(){ganttYear=new Date().getFullYear();ganttMonth=new Date().getMonth();renderGantt()}

function renderGantt(){
  const thMonths=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  document.getElementById('ganttMonthLabel').textContent=`${thMonths[ganttMonth]} ${ganttYear+543}`;
  const days=daysInMonth(ganttYear,ganttMonth);
  const today=new Date();
  const teams=[...new Set(allData.map(a=>a.team).filter(Boolean))].sort();
  if(!teams.length){document.getElementById('ganttInner').innerHTML='<div class="gantt-empty">ยังไม่มีข้อมูลการมอบหมายงาน</div>';return}
  let daysHtml='';
  for(let d=1;d<=days;d++){
    const isWE=isWeekend(ganttYear,ganttMonth,d);
    const isTd=today.getDate()===d&&today.getMonth()===ganttMonth&&today.getFullYear()===ganttYear;
    daysHtml+=`<div class="gantt-day-hdr${isWE?' weekend':''}${isTd?' today':''}">${d}</div>`;
  }
  document.getElementById('ganttLegend').innerHTML=teams.map((t,i)=>`
    <div class="legend-item"><div class="legend-dot" style="background:${TEAM_COLORS[i%TEAM_COLORS.length]}"></div>${t}</div>`).join('');
  const rowsHtml=teams.map((team,ti)=>{
    const color=TEAM_COLORS[ti%TEAM_COLORS.length];
    const teamJobs=allData.filter(a=>a.team===team);
    let cellsHtml='';
    for(let d=1;d<=days;d++){
      const isWE=isWeekend(ganttYear,ganttMonth,d);
      const isTd=today.getDate()===d&&today.getMonth()===ganttMonth&&today.getFullYear()===ganttYear;
      cellsHtml+=`<div class="gantt-cell${isWE?' weekend':''}${isTd?' today':''}"></div>`;
    }
    const barsHtml=teamJobs.map(job=>{
      const s=tsToDate(job.startDate);
      const e=tsToDate(job.endDate);
      if(!s||!e)return'';
      const monthStart=new Date(Date.UTC(ganttYear,ganttMonth,1));
      const monthEnd=new Date(Date.UTC(ganttYear,ganttMonth,days));
      if(e<monthStart||s>monthEnd)return'';
      const sInMonth=s<monthStart?monthStart:s;
      const eInMonth=e>monthEnd?monthEnd:e;
      const startDay=sInMonth.getUTCDate();
      const endDay=eInMonth.getUTCDate();
      const left=((startDay-1)/days)*100;
      const width=((endDay-startDay+1)/days)*100;
      const opacity=job.status==='เสร็จแล้ว'?'opacity:.5':job.status==='วางแผน'?'opacity:.75':'';
      const tip=encodeURIComponent(JSON.stringify({
        job:job.jobNo,name:job.jobName,company:job.company,province:job.province,
        start:fmtDate(job.startDate),end:fmtDate(job.endDate),status:job.status,
        members:job.members
      }));
      return`<div class="gantt-bar" style="left:${left}%;width:calc(${width}% - 2px);background:${color};${opacity}" data-tip="${tip}" onmouseenter="showTip(event,this)" onmouseleave="hideTip()">${job.jobNo||job.company||''}</div>`;
    }).join('');
    return`<div class="gantt-row">
      <div class="gantt-team-label"><div class="team-dot" style="background:${color}"></div><div class="team-name">${team}</div></div>
      <div class="gantt-cells" style="position:relative">${cellsHtml}<div style="position:absolute;inset:0;pointer-events:none">${barsHtml}</div></div>
    </div>`;
  }).join('');
  document.getElementById('ganttInner').innerHTML=`
    <div class="gantt-header"><div class="gantt-team-col">ชุด</div><div class="gantt-days">${daysHtml}</div></div>
    ${rowsHtml}`;
}

function showTip(e,el){
  const tip=document.getElementById('tooltip');
  try{
    const d=JSON.parse(decodeURIComponent(el.dataset.tip));
    tip.innerHTML=`
      <div class="tooltip-title">${d.job}</div>
      <div>${d.company}</div>
      ${d.province?`<div>📍 ${d.province}</div>`:''}
      <div>📅 ${d.start} – ${d.end}</div>
      <div>🔖 ${d.status}</div>
      ${d.members?`<div>👥 ${d.members}</div>`:''}
    `;
  }catch{tip.innerHTML=el.dataset.tip}
  tip.style.left=Math.min(e.clientX+12,window.innerWidth-300)+'px';
  tip.style.top=e.clientY+12+'px';
  tip.classList.add('show');
}
function hideTip(){document.getElementById('tooltip').classList.remove('show')}

function updateTeamFilter(){
  const teams=[...new Set(allData.map(a=>a.team).filter(Boolean))].sort();
  const sel=document.getElementById('filterTeam');
  const cur=sel.value;
  sel.innerHTML='<option value="">ทุกชุด</option>'+teams.map(t=>`<option value="${t}"${t===cur?' selected':''}>${t}</option>`).join('');
}

function renderTable(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const teamF=document.getElementById('filterTeam').value;
  const statusF=document.getElementById('filterStatus').value;
  const filtered=allData.filter(a=>{
    if(teamF&&a.team!==teamF)return false;
    if(statusF&&a.status!==statusF)return false;
    if(q){const hay=[a.jobNo,a.jobName,a.company,a.province,a.detail,a.team,a.members].join(' ').toLowerCase();if(!hay.includes(q))return false}
    return true;
  });
  if(!filtered.length){document.getElementById('tableBody').innerHTML=`<tr><td colspan="10"><div class="empty-wrap"><div class="empty-icon">📭</div><p>ไม่พบข้อมูล</p></div></td></tr>`;return}
  const bc={'วางแผน':'badge-plan','กำลังทำ':'badge-doing','เสร็จแล้ว':'badge-done'};
  document.getElementById('tableBody').innerHTML=filtered.map(a=>`
    <tr>
      <td><span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;background:${getTeamColor(a.team)}20;color:${getTeamColor(a.team)};border:1px solid ${getTeamColor(a.team)}50">${a.team||'—'}</span></td>
      <td class="td-job">${a.jobNo||'—'}</td>
      <td class="td-company">${a.company||'—'}</td>
      <td>${a.province||'—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${a.detail||''}">${a.detail||'—'}</td>
      <td class="td-date">${fmtDate(a.startDate)}</td>
      <td class="td-date">${fmtDate(a.endDate)}</td>
      <td><span class="badge ${bc[a.status]||'badge-plan'}">${a.status||'วางแผน'}</span></td>
      <td class="td-members" title="${a.members||''}">${a.members||'<span style="color:var(--border2)">ทั้งชุด</span>'}</td>
      <td style="font-size:12px;color:var(--text3)">${a.car||'—'}</td>
    </tr>`).join('');
}

setInterval(loadData,5*60*1000);
loadData();
</script>
</body>
</html>
